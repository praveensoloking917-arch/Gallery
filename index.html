<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css">
   <link rel="icon" href="image/download.png">
</head>
<body>

    <h1>Responsive Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('animals')">Animals</button>
        <button onclick="filterImages('city')">City</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <div class="image-box nature">
            <img src="https://picsum.photos/id/1037/400/300" onclick="openLightbox(0)">
        </div>

        <div class="image-box city">
            <img src="https://picsum.photos/id/273/400/300" onclick="openLightbox(1)">
        </div>

        <div class="image-box city">
            <img src="https://picsum.photos/id/1011/400/300" onclick="openLightbox(2)">
        </div>

        <div class="image-box nature">
            <img src="https://picsum.photos/id/1015/400/300" onclick="openLightbox(3)">
        </div>

        <div class="image-box animals">
            <img src="https://picsum.photos/id/1025/400/300" onclick="openLightbox(4)">
        </div>

        <div class="image-box nature">
            <img src="https://picsum.photos/id/1050/400/300" onclick="openLightbox(5)">
        </div>
<div class="image-box city">
            <img src="https://picsum.photos/id/1047/400/300" onclick="openLightbox(6)">
        </div>
<div class="image-box city">
            <img src="https://picsum.photos/id/1048/400/300" onclick="openLightbox(7)">
        </div>
<div class="image-box nature">
            <img src="https://picsum.photos/id/1019/400/300" onclick="openLightbox(8)">
        </div>
<div class="image-box city">
            <img src="https://picsum.photos/id/1040/400/300" onclick="openLightbox(9)">
        </div>

    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <span class="close" onclick="closeLightbox()">×</span>

        <button class="prev" onclick="changeImage(-1)">❮</button>

        <img id="lightbox-img">

        <button class="next" onclick="changeImage(1)">❯</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
